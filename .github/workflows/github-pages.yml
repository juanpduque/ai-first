# Publica el sitio en GitHub Pages (rama gh-pages).
# Activar en el repo: Settings → Pages → Build and deployment → Source: Deploy from a branch → gh-pages / Root.
name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build HTML from Markdown
        run: npm run build

      - name: Assemble static site
        run: |
          mkdir -p build
          cp src/index.html build/
          cp -r src/css build/ 2>/dev/null || true
          cp src/flujo_ciclico.html build/ 2>/dev/null || true

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build
          cname: false
